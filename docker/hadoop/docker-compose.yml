version: "3.8"

# Apache Hadoop 3-node cluster for benchmarking
# Mirrors the mini-Hadoop Docker Compose topology

services:
  hadoop-namenode:
    image: apache/hadoop:3
    hostname: hadoop-namenode
    user: root
    command:
      - sh
      - -c
      - |
        mkdir -p /opt/hadoop-data/namenode
        if [ ! -f /opt/hadoop-data/namenode/current/VERSION ]; then
          echo "Formatting NameNode..."
          hdfs namenode -format -force -nonInteractive
        fi
        hdfs namenode
    ports:
      - "127.0.0.1:9870:9870"
      - "127.0.0.1:8020:8020"
    environment:
      HADOOP_HOME: /opt/hadoop
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-bench
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9870/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  hadoop-resourcemanager:
    image: apache/hadoop:3
    hostname: hadoop-resourcemanager
    user: root
    command: ["yarn", "resourcemanager"]
    ports:
      - "127.0.0.1:8088:8088"
    env_file:
      - ./hadoop.env
    depends_on:
      hadoop-namenode:
        condition: service_healthy
    networks:
      - hadoop-bench

  hadoop-worker-1:
    image: apache/hadoop:3
    hostname: hadoop-worker-1
    user: root
    command:
      - sh
      - -c
      - |
        mkdir -p /opt/hadoop-data/datanode
        hdfs datanode &
        yarn nodemanager
    env_file:
      - ./hadoop.env
    depends_on:
      hadoop-namenode:
        condition: service_healthy
      hadoop-resourcemanager:
        condition: service_started
    networks:
      - hadoop-bench

  hadoop-worker-2:
    image: apache/hadoop:3
    hostname: hadoop-worker-2
    user: root
    command:
      - sh
      - -c
      - |
        mkdir -p /opt/hadoop-data/datanode
        hdfs datanode &
        yarn nodemanager
    env_file:
      - ./hadoop.env
    depends_on:
      hadoop-namenode:
        condition: service_healthy
      hadoop-resourcemanager:
        condition: service_started
    networks:
      - hadoop-bench

  hadoop-worker-3:
    image: apache/hadoop:3
    hostname: hadoop-worker-3
    user: root
    command:
      - sh
      - -c
      - |
        mkdir -p /opt/hadoop-data/datanode
        hdfs datanode &
        yarn nodemanager
    env_file:
      - ./hadoop.env
    depends_on:
      hadoop-namenode:
        condition: service_healthy
      hadoop-resourcemanager:
        condition: service_started
    networks:
      - hadoop-bench

  hadoop-client:
    image: apache/hadoop:3
    hostname: hadoop-client
    user: root
    command: ["sleep", "infinity"]
    env_file:
      - ./hadoop.env
    depends_on:
      - hadoop-worker-1
      - hadoop-worker-2
      - hadoop-worker-3
    networks:
      - hadoop-bench

networks:
  hadoop-bench:
    driver: bridge
